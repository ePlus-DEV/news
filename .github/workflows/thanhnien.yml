name: "Cronjob ThanhNien"
on:
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  thanhnien_job:
    name: Thanh Niên - ${{ matrix.rand_seed }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - feed_list: "https://thanhnien.vn/rss/home.rss"
            readme_path: "./docs/index.md"
            rand_seed: "thanhnien"
          - feed_list: "https://thanhnien.vn/rss/chinh-tri.rss"
            readme_path: "./docs/thanhnien/chinh-tri.md"
            rand_seed: "thanhnien-chinh-tri"
          - feed_list: "https://thanhnien.vn/rss/thoi-su.rss"
            readme_path: "./docs/thanhnien/thoi-su.md"
            rand_seed: "thanhnien-thoi-su"
          - feed_list: "https://thanhnien.vn/rss/chao-ngay-moi.rss"
            readme_path: "./docs/thanhnien/chao-ngay-moi.md"
            rand_seed: "thanhnien-chao-ngay-moi"
          - feed_list: "https://thanhnien.vn/rss/the-gioi.rss"
            readme_path: "./docs/thanhnien/the-gioi.md"
            rand_seed: "thanhnien-the-gioi"
          - feed_list: "https://thanhnien.vn/rss/kinh-te.rss"
            readme_path: "./docs/thanhnien/kinh-te.md"
            rand_seed: "thanhnien-kinh-te"
          - feed_list: "https://thanhnien.vn/rss/doi-song.rss"
            readme_path: "./docs/thanhnien/doi-song.md"
            rand_seed: "thanhnien-doi-song"
          - feed_list: "https://thanhnien.vn/rss/suc-khoe.rss"
            readme_path: "./docs/thanhnien/suc-khoe.md"
            rand_seed: "thanhnien-suc-khoe"
          - feed_list: "https://thanhnien.vn/rss/gioi-tre.rss"
            readme_path: "./docs/thanhnien/gioi-tre.md"
            rand_seed: "thanhnien-gioi-tre"
          - feed_list: "https://thanhnien.vn/rss/tieu-dung-thong-minh.rss"
            readme_path: "./docs/thanhnien/tieu-dung-thong-minh.md"
            rand_seed: "thanhnien-tieu-dung-thong-minh"
          - feed_list: "https://thanhnien.vn/rss/giao-duc.rss"
            readme_path: "./docs/thanhnien/giao-duc.md"
            rand_seed: "thanhnien-giao-duc"
          - feed_list: "https://thanhnien.vn/rss/du-lich.rss"
            readme_path: "./docs/thanhnien/du-lich.md"
            rand_seed: "thanhnien-du-lich"
          - feed_list: "https://thanhnien.vn/rss/van-hoa.rss"
            readme_path: "./docs/thanhnien/van-hoa.md"
            rand_seed: "thanhnien-van-hoa"
          - feed_list: "https://thanhnien.vn/rss/giai-tri.rss"
            readme_path: "./docs/thanhnien/giai-tri.md"
            rand_seed: "thanhnien-giai-tri"
          - feed_list: "https://thanhnien.vn/rss/the-thao.rss"
            readme_path: "./docs/thanhnien/the-thao.md"
            rand_seed: "thanhnien-the-thao"
          - feed_list: "https://thanhnien.vn/rss/cong-nghe.rss"
            readme_path: "./docs/thanhnien/cong-nghe.md"
            rand_seed: "thanhnien-cong-nghe"
          - feed_list: "https://thanhnien.vn/rss/xe.rss"
            readme_path: "./docs/thanhnien/xe.md"
            rand_seed: "thanhnien-xe"
          - feed_list: "https://thanhnien.vn/rss/thoi-trang-tre.rss"
            readme_path: "./docs/thanhnien/thoi-trang-tre.md"
            rand_seed: "thanhnien-thoi-trang-tre"
          - feed_list: "https://thanhnien.vn/rss/ban-doc.rss"
            readme_path: "./docs/thanhnien/ban-doc.md"
            rand_seed: "thanhnien-ban-doc"
          - feed_list: "https://thanhnien.vn/rss/video.rss"
            readme_path: "./docs/thanhnien/video.md"
            rand_seed: "thanhnien-video"
          - feed_list: "https://thanhnien.vn/rss/dien-dan.rss"
            readme_path: "./docs/thanhnien/dien-dan.md"
            rand_seed: "thanhnien-dien-dan"
          - feed_list: "https://thanhnien.vn/rss/podcast.rss"
            readme_path: "./docs/thanhnien/podcast.md"
            rand_seed: "thanhnien-podcast"
          - feed_list: "https://thanhnien.vn/rss/magazine.rss"
            readme_path: "./docs/thanhnien/magazine.md"
            rand_seed: "thanhnien-magazine"
          - feed_list: "https://thanhnien.vn/rss/ban-can-biet.rss"
            readme_path: "./docs/thanhnien/ban-can-biet.md"
            rand_seed: "thanhnien-ban-can-biet"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull in ThanhNien news
        uses: ePlus-DEV/blog-post-workflow@v1
        with:
          retry_count: 1
          request_timeout: 15
          push_retry_count: 10
          readme_path: ${{ matrix.readme_path }}
          feed_list: ${{ matrix.feed_list }}
          committer_email: "h250694@gmail.com"
          commit_message: "Get ThanhNien news - ${{ matrix.rand_seed }} - ${{ github.event.repository.updated_at}}"
          rand_seed: ${{ matrix.rand_seed }}
          comment_tag_name: ${{ matrix.rand_seed }}
          date_format: "HH:MM dd/mm/yyyy"
          template: "$newline- $randomEmoji(💯,🔥,💫,🚀,🌮,📝,🥳,💻,🧰,🏊,🥰,🧐,🤓,😎,🥸,🤩,🤗,🤔,🫣,🤭,🤠,👹,👺,🤡,🤖,🎃,😺,🫶,👍,💪,💄,👀,🧠,🧑‍🏫,👨‍🏫,💂,🧑‍💻,🥷,💃,🕴,💼,🎓,🐻,🐵,🙉,🦄,🦆,🦅,🦍,🦣,🐘,🦒,🦏,🐎,🦩,🐲,🌝,🌜,🌏,🌈,🌊,🎬,🎭,🚀,🚦,⛽️,🗽,🎡,🌋,🌁,💡,🕯,🪜,🧰,⚗️,🔭,🪄,🎊,🎉) [$title]($url) - $date"
          max_post_count: 60

      - name: Force Run Workflow
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'laodong.yml',
              ref: 'main',
            })
